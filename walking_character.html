<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Walking Character</title>
  <style>
    :root {
      color-scheme: dark;
      --panel: rgba(14, 20, 28, 0.78);
      --panel-border: rgba(255, 255, 255, 0.16);
      --text: #f6f2e8;
      --muted: #aeb8c5;
      --accent: #f6c85f;
      --active: #e7f3ff;
      --active-text: #111820;
      --danger: #ef7b65;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      overflow: hidden;
      background: #111820;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
    }

    body {
      min-height: 100vh;
    }

    .stage {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      background: #111820;
    }

    .hud {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      width: min(920px, calc(100vw - 28px));
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      background: var(--panel);
      backdrop-filter: blur(16px);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.28);
    }

    .brand {
      min-width: 148px;
      padding: 0 8px;
    }

    .brand strong {
      display: block;
      font-size: 15px;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .brand span {
      display: block;
      margin-top: 2px;
      font-size: 12px;
      color: var(--muted);
    }

    .control-groups {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 8px;
    }

    .segmented {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: 1fr;
      gap: 4px;
      padding: 4px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
    }

    button {
      min-height: 38px;
      border: 0;
      border-radius: 6px;
      color: var(--text);
      background: transparent;
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0;
      cursor: pointer;
      transition: background 160ms ease, color 160ms ease, transform 160ms ease;
      white-space: nowrap;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.14);
    }

    button:active {
      transform: translateY(1px);
    }

    button[aria-pressed="true"] {
      color: var(--active-text);
      background: var(--active);
    }

    .actions {
      display: grid;
      grid-template-columns: 42px 42px 118px;
      align-items: center;
      gap: 8px;
    }

    .icon-button {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      min-height: 42px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.08);
      font-size: 17px;
    }

    .icon {
      position: relative;
      display: block;
      width: 20px;
      height: 20px;
    }

    .icon-pause::before,
    .icon-pause::after {
      content: "";
      position: absolute;
      top: 3px;
      bottom: 3px;
      width: 5px;
      border-radius: 2px;
      background: currentColor;
    }

    .icon-pause::before {
      left: 4px;
    }

    .icon-pause::after {
      right: 4px;
    }

    .icon-play::before {
      content: "";
      position: absolute;
      left: 6px;
      top: 3px;
      width: 0;
      height: 0;
      border-left: 12px solid currentColor;
      border-top: 7px solid transparent;
      border-bottom: 7px solid transparent;
    }

    .icon-reset::before {
      content: "";
      position: absolute;
      inset: 3px;
      border: 3px solid currentColor;
      border-right-color: transparent;
      border-radius: 50%;
      transform: rotate(-28deg);
    }

    .icon-reset::after {
      content: "";
      position: absolute;
      left: 2px;
      top: 5px;
      width: 0;
      height: 0;
      border-right: 7px solid currentColor;
      border-top: 5px solid transparent;
      border-bottom: 5px solid transparent;
      transform: rotate(-18deg);
    }

    .speed {
      display: grid;
      grid-template-columns: 1fr;
      gap: 4px;
      min-width: 118px;
    }

    .speed label {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      line-height: 1;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .scene-name {
      position: fixed;
      top: 18px;
      left: 18px;
      display: grid;
      gap: 2px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(10, 14, 18, 0.42);
      backdrop-filter: blur(14px);
      pointer-events: none;
    }

    .scene-name strong {
      font-size: 14px;
      line-height: 1.1;
    }

    .scene-name span {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.72);
    }

    @media (max-width: 760px) {
      .hud {
        grid-template-columns: 1fr;
        gap: 8px;
        bottom: 12px;
      }

      .brand {
        display: flex;
        justify-content: space-between;
        align-items: end;
        gap: 12px;
      }

      .brand span {
        text-align: right;
      }

      .control-groups {
        grid-template-columns: 1fr;
      }

      .actions {
        grid-template-columns: 42px 42px 1fr;
      }

      button {
        font-size: 12px;
      }
    }

    @media (max-width: 420px) {
      .hud {
        width: calc(100vw - 20px);
        padding: 8px;
      }

      .segmented {
        grid-auto-flow: row;
        grid-auto-rows: 34px;
      }

      .scene-name {
        left: 10px;
        top: 10px;
      }
    }
  </style>
</head>
<body>
  <main class="stage" aria-label="Animated walking character scene">
    <canvas id="scene"></canvas>

    <div class="scene-name" aria-hidden="true">
      <strong id="sceneTitle">Robot Strut</strong>
      <span id="sceneSubtitle">neon transit deck</span>
    </div>

    <section class="hud" aria-label="Animation controls">
      <div class="brand">
        <strong>Walk Cycle</strong>
        <span id="comboLabel">Robot / Confident</span>
      </div>

      <div class="control-groups">
        <div class="segmented" role="group" aria-label="Character">
          <button type="button" data-character="robot" aria-pressed="true">Robot</button>
          <button type="button" data-character="human" aria-pressed="false">Human</button>
          <button type="button" data-character="stick" aria-pressed="false">Stick</button>
        </div>

        <div class="segmented" role="group" aria-label="Personality">
          <button type="button" data-personality="confident" aria-pressed="true">Confident</button>
          <button type="button" data-personality="lazy" aria-pressed="false">Lazy</button>
          <button type="button" data-personality="sneaky" aria-pressed="false">Sneaky</button>
        </div>
      </div>

      <div class="actions">
        <button class="icon-button" id="playPause" type="button" aria-label="Pause animation" title="Pause">
          <span class="icon icon-pause" aria-hidden="true"></span>
        </button>
        <button class="icon-button" id="reset" type="button" aria-label="Reset character" title="Reset">
          <span class="icon icon-reset" aria-hidden="true"></span>
        </button>
        <div class="speed">
          <label for="speed"><span>Speed</span><span id="speedValue">1.0x</span></label>
          <input id="speed" type="range" min="0.5" max="1.8" value="1" step="0.1">
        </div>
      </div>
    </section>
  </main>

  <script>
    const canvas = document.querySelector("#scene");
    const ctx = canvas.getContext("2d");
    const comboLabel = document.querySelector("#comboLabel");
    const sceneTitle = document.querySelector("#sceneTitle");
    const sceneSubtitle = document.querySelector("#sceneSubtitle");
    const speedInput = document.querySelector("#speed");
    const speedValue = document.querySelector("#speedValue");
    const playPause = document.querySelector("#playPause");
    const playIcon = playPause.querySelector(".icon");
    const resetButton = document.querySelector("#reset");

    const state = {
      character: "robot",
      personality: "confident",
      speed: 1,
      running: true,
      x: -120,
      t: 0,
      lastTime: performance.now(),
      dpr: 1,
      width: 0,
      height: 0
    };

    const characterNames = {
      robot: "Robot",
      human: "Human",
      stick: "Stick"
    };

    const personalityNames = {
      confident: "Confident",
      lazy: "Lazy",
      sneaky: "Sneaky"
    };

    const sceneCopy = {
      robot: {
        confident: ["Robot Strut", "neon transit deck"],
        lazy: ["Robot Drift", "maintenance bay"],
        sneaky: ["Robot Creep", "security corridor"]
      },
      human: {
        confident: ["City Stride", "morning crosswalk"],
        lazy: ["Slow Stroll", "sunlit park path"],
        sneaky: ["Alley Tiptoe", "after-hours block"]
      },
      stick: {
        confident: ["Sketch March", "paper parade lane"],
        lazy: ["Doodle Drag", "notebook margin"],
        sneaky: ["Ink Sneak", "back-page hideout"]
      }
    };

    const personalityConfig = {
      confident: {
        stride: 1.16,
        bob: 6,
        lean: -0.04,
        speed: 96,
        arm: 1.1,
        knee: 1,
        crouch: 0,
        drag: 0
      },
      lazy: {
        stride: 0.72,
        bob: 2,
        lean: 0.18,
        speed: 55,
        arm: 0.44,
        knee: 0.45,
        crouch: 7,
        drag: 7
      },
      sneaky: {
        stride: 0.56,
        bob: 3,
        lean: -0.24,
        speed: 70,
        arm: 0.68,
        knee: 1.25,
        crouch: 18,
        drag: -4
      }
    };

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      state.dpr = dpr;
      state.width = window.innerWidth;
      state.height = window.innerHeight;
      canvas.width = Math.floor(state.width * dpr);
      canvas.height = Math.floor(state.height * dpr);
      canvas.style.width = `${state.width}px`;
      canvas.style.height = `${state.height}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function setPressed(selector, value) {
      document.querySelectorAll(selector).forEach((button) => {
        const key = button.dataset.character || button.dataset.personality;
        button.setAttribute("aria-pressed", String(key === value));
      });
    }

    function updateLabels() {
      comboLabel.textContent = `${characterNames[state.character]} / ${personalityNames[state.personality]}`;
      const copy = sceneCopy[state.character][state.personality];
      sceneTitle.textContent = copy[0];
      sceneSubtitle.textContent = copy[1];
      speedValue.textContent = `${state.speed.toFixed(1)}x`;
    }

    function resetWalker() {
      const scale = getScale();
      state.x = -92 * scale;
      state.t = 0;
    }

    function getScale() {
      return Math.max(0.72, Math.min(1.15, state.width / 1100));
    }

    function groundY() {
      return Math.round(state.height * (state.height < 620 ? 0.68 : 0.71));
    }

    function lerp(a, b, amount) {
      return a + (b - a) * amount;
    }

    function gradient(colors) {
      const g = ctx.createLinearGradient(0, 0, 0, state.height);
      colors.forEach(([stop, color]) => g.addColorStop(stop, color));
      return g;
    }

    function drawBackground() {
      if (state.character === "robot") {
        drawRobotBackground();
      } else if (state.character === "human") {
        drawHumanBackground();
      } else {
        drawStickBackground();
      }
    }

    function drawRobotBackground() {
      const h = state.height;
      const w = state.width;
      const y = groundY();
      const mood = state.personality;

      ctx.fillStyle = gradient([
        [0, mood === "sneaky" ? "#101827" : "#182537"],
        [0.54, mood === "lazy" ? "#263040" : "#1d3c51"],
        [1, "#101216"]
      ]);
      ctx.fillRect(0, 0, w, h);

      ctx.globalAlpha = 0.22;
      for (let i = 0; i < 90; i += 1) {
        const x = (i * 137 + state.t * 18) % (w + 180) - 90;
        const yy = (i * 47) % Math.max(220, y - 80);
        ctx.fillStyle = i % 3 === 0 ? "#bde9ff" : "#77f2d3";
        ctx.fillRect(x, yy, i % 4 === 0 ? 2 : 1, i % 5 === 0 ? 18 : 7);
      }
      ctx.globalAlpha = 1;

      drawGridFloor(y, "#3dd6c6", mood === "confident" ? 0.24 : 0.14);

      const panelOffset = (state.t * 38) % 180;
      for (let x = -240 - panelOffset; x < w + 220; x += 180) {
        ctx.fillStyle = "rgba(210, 236, 255, 0.08)";
        ctx.fillRect(x, y - 250, 112, 190);
        ctx.fillStyle = mood === "sneaky" ? "rgba(239, 123, 101, 0.28)" : "rgba(90, 245, 213, 0.28)";
        ctx.fillRect(x + 20, y - 222, 72, 8);
        ctx.fillRect(x + 20, y - 196, 46, 8);
        ctx.fillRect(x + 20, y - 84, 70, 12);
      }

      ctx.fillStyle = "rgba(255, 255, 255, 0.12)";
      ctx.fillRect(0, y - 52, w, 5);
      ctx.fillStyle = mood === "lazy" ? "#f6c85f" : "#77f2d3";
      for (let x = -80; x < w + 80; x += 92) {
        ctx.fillRect(x - (state.t * 85) % 92, y - 42, 48, 4);
      }
    }

    function drawHumanBackground() {
      const h = state.height;
      const w = state.width;
      const y = groundY();
      const mood = state.personality;

      ctx.fillStyle = gradient([
        [0, mood === "sneaky" ? "#182136" : "#7fc7e8"],
        [0.62, mood === "lazy" ? "#ffd68c" : "#d8eef1"],
        [1, mood === "sneaky" ? "#26222b" : "#7b8f69"]
      ]);
      ctx.fillRect(0, 0, w, h);

      if (mood !== "sneaky") {
        ctx.fillStyle = "rgba(255, 242, 169, 0.92)";
        ctx.beginPath();
        ctx.arc(w - 110, 92, 34, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.fillStyle = "rgba(218, 234, 255, 0.76)";
        ctx.beginPath();
        ctx.arc(w - 120, 88, 26, 0, Math.PI * 2);
        ctx.fill();
      }

      const buildingSpacing = 260;
      const buildingScroll = state.t * 22;
      const firstBuilding = Math.floor((buildingScroll - 300) / buildingSpacing);
      for (let i = firstBuilding; ; i += 1) {
        const x = i * buildingSpacing - buildingScroll;
        if (x > w + 280) {
          break;
        }
        const pattern = ((i % 6) + 6) % 6;
        const bH = mood === "sneaky" ? 210 + (pattern % 3) * 24 : 160 + (pattern % 4) * 24;
        ctx.fillStyle = mood === "sneaky" ? "#22283a" : pattern % 2 ? "#f0a66c" : "#f6efe2";
        ctx.fillRect(x, y - 82 - bH, 190, bH);
        ctx.fillStyle = mood === "sneaky" ? "rgba(246, 200, 95, 0.5)" : "rgba(62, 98, 125, 0.26)";
        for (let row = 0; row < 4; row += 1) {
          for (let col = 0; col < 3; col += 1) {
            ctx.fillRect(x + 26 + col * 48, y - bH - 38 + row * 42, 22, 18);
          }
        }
      }

      ctx.fillStyle = mood === "sneaky" ? "#151922" : "#465d50";
      ctx.fillRect(0, y - 80, w, 80);

      if (mood === "lazy") {
        for (let x = 40 - ((state.t * 36) % 150); x < w + 160; x += 150) {
          drawTree(x, y - 80, 1);
        }
      }

      ctx.fillStyle = mood === "sneaky" ? "#2f3140" : "#596267";
      ctx.fillRect(0, y, w, h - y);
      ctx.fillStyle = "rgba(255, 255, 255, 0.26)";
      for (let x = -100; x < w + 100; x += 160) {
        ctx.fillRect(x - (state.t * 70) % 160, y + 34, 92, 8);
      }
    }

    function drawTree(x, baseY, scale) {
      ctx.fillStyle = "#7d5838";
      ctx.fillRect(x - 5 * scale, baseY - 60 * scale, 10 * scale, 60 * scale);
      ctx.fillStyle = "#4c9366";
      ctx.beginPath();
      ctx.arc(x - 16 * scale, baseY - 66 * scale, 26 * scale, 0, Math.PI * 2);
      ctx.arc(x + 12 * scale, baseY - 74 * scale, 32 * scale, 0, Math.PI * 2);
      ctx.arc(x + 28 * scale, baseY - 52 * scale, 24 * scale, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawStickBackground() {
      const h = state.height;
      const w = state.width;
      const y = groundY();
      const mood = state.personality;

      ctx.fillStyle = mood === "sneaky" ? "#25232f" : "#f1e8d0";
      ctx.fillRect(0, 0, w, h);

      ctx.strokeStyle = mood === "sneaky" ? "rgba(255,255,255,0.08)" : "rgba(35, 41, 52, 0.12)";
      ctx.lineWidth = 1;
      for (let yy = 26; yy < h; yy += 34) {
        ctx.beginPath();
        ctx.moveTo(0, yy);
        ctx.lineTo(w, yy + Math.sin(yy + state.t) * 2);
        ctx.stroke();
      }
      for (let x = 34; x < w; x += 34) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x + Math.sin(x) * 2, h);
        ctx.stroke();
      }

      const offset = (state.t * 28) % 240;
      ctx.lineWidth = 3;
      ctx.strokeStyle = mood === "sneaky" ? "rgba(246, 200, 95, 0.32)" : "rgba(32, 44, 57, 0.32)";
      for (let x = -280 - offset; x < w + 240; x += 240) {
        ctx.strokeRect(x, y - 228, 136, 150);
        ctx.beginPath();
        ctx.moveTo(x + 18, y - 178);
        ctx.lineTo(x + 112, y - 204);
        ctx.moveTo(x + 22, y - 126);
        ctx.lineTo(x + 94, y - 106);
        ctx.stroke();
      }

      ctx.fillStyle = mood === "sneaky" ? "#171723" : "#d7c9a6";
      ctx.fillRect(0, y - 42, w, 42);
      ctx.fillStyle = mood === "sneaky" ? "#11121a" : "#b9aa86";
      ctx.fillRect(0, y, w, h - y);

      ctx.strokeStyle = mood === "confident" ? "#e26d5a" : mood === "lazy" ? "#6a7f55" : "#f6c85f";
      ctx.lineWidth = 2;
      for (let x = -60; x < w + 80; x += 76) {
        ctx.beginPath();
        ctx.moveTo(x - (state.t * 52) % 76, y + 26);
        ctx.lineTo(x + 36 - (state.t * 52) % 76, y + 26);
        ctx.stroke();
      }
    }

    function drawGridFloor(y, color, alpha) {
      const w = state.width;
      const h = state.height;
      ctx.fillStyle = "#101216";
      ctx.fillRect(0, y, w, h - y);
      ctx.strokeStyle = color;
      ctx.globalAlpha = alpha;
      ctx.lineWidth = 1;
      for (let i = 0; i < 12; i += 1) {
        const yy = y + i * i * 4.5;
        ctx.beginPath();
        ctx.moveTo(0, yy);
        ctx.lineTo(w, yy);
        ctx.stroke();
      }
      for (let x = -w; x < w * 2; x += 80) {
        const shifted = x - (state.t * 88) % 80;
        ctx.beginPath();
        ctx.moveTo(w / 2 + (shifted - w / 2) * 0.34, y);
        ctx.lineTo(shifted, h);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
    }

    function drawWalker() {
      const scale = getScale();
      const baseY = groundY();
      const config = personalityConfig[state.personality];
      const phase = state.t * (state.personality === "lazy" ? 4.4 : state.personality === "sneaky" ? 6.4 : 5.6);
      const bob = Math.sin(phase * 2) * config.bob;
      const y = baseY + bob + config.crouch;

      ctx.save();
      ctx.translate(state.x, y);
      ctx.scale(scale, scale);

      if (state.character === "robot") {
        drawRobot(phase, config);
      } else if (state.character === "human") {
        drawHuman(phase, config);
      } else {
        drawStick(phase, config);
      }

      ctx.restore();
    }

    function limbAngles(phase, config) {
      const stride = Math.sin(phase) * config.stride;
      const counter = Math.sin(phase + Math.PI) * config.stride;
      const bendA = Math.max(0, Math.sin(phase + Math.PI / 2)) * config.knee;
      const bendB = Math.max(0, Math.sin(phase + Math.PI * 1.5)) * config.knee;
      return { stride, counter, bendA, bendB };
    }

    function drawShadow(config) {
      ctx.save();
      ctx.globalAlpha = state.personality === "sneaky" ? 0.18 : 0.24;
      ctx.fillStyle = "#000";
      ctx.beginPath();
      ctx.ellipse(0, 8, state.personality === "lazy" ? 68 : 56, 12, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawRobot(phase, config) {
      const { stride, counter, bendA, bendB } = limbAngles(phase, config);
      const bodyY = -112;
      const lean = config.lean;
      drawShadow(config);

      ctx.save();
      ctx.rotate(lean);

      drawRobotLeg(-18, -50, stride, bendA, "#85e6da");
      drawRobotLeg(18, -50, counter, bendB, "#c1e8ff");

      ctx.fillStyle = "#263241";
      roundRect(-38, bodyY, 76, 76, 12);
      ctx.fill();
      ctx.fillStyle = "#78f0d7";
      roundRect(-24, bodyY + 16, 48, 14, 5);
      ctx.fill();
      ctx.fillStyle = state.personality === "sneaky" ? "#ef7b65" : "#f6c85f";
      roundRect(-13, bodyY + 42, 26, 10, 4);
      ctx.fill();

      drawRobotArm(-42, bodyY + 12, counter * config.arm, "#c1e8ff");
      drawRobotArm(42, bodyY + 12, stride * config.arm, "#85e6da");

      ctx.fillStyle = "#2d3c4d";
      roundRect(-31, bodyY - 51, 62, 42, 10);
      ctx.fill();
      ctx.fillStyle = "#e7f3ff";
      ctx.fillRect(-18, bodyY - 33, 13, 9);
      ctx.fillRect(7, bodyY - 33, 13, 9);
      ctx.strokeStyle = "#78f0d7";
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(0, bodyY - 51);
      ctx.lineTo(0, bodyY - 66);
      ctx.stroke();
      ctx.fillStyle = "#f6c85f";
      ctx.beginPath();
      ctx.arc(0, bodyY - 70, 5, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function drawRobotLeg(x, y, swing, bend, color) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(swing * 0.38);
      ctx.fillStyle = color;
      roundRect(-9, 0, 18, 42, 6);
      ctx.fill();
      ctx.translate(0, 38);
      ctx.rotate((bend + 0.2) * 0.5);
      ctx.fillStyle = "#d4f5ff";
      roundRect(-8, 0, 16, 44, 6);
      ctx.fill();
      ctx.translate(0, 42);
      ctx.rotate(-0.18);
      ctx.fillStyle = "#263241";
      roundRect(-10, -2, 32, 12, 5);
      ctx.fill();
      ctx.restore();
    }

    function drawRobotArm(x, y, swing, color) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(-swing * 0.34);
      ctx.fillStyle = color;
      roundRect(-8, 0, 16, 39, 6);
      ctx.fill();
      ctx.translate(0, 36);
      ctx.rotate(-0.4);
      ctx.fillStyle = "#d4f5ff";
      roundRect(-7, 0, 14, 32, 6);
      ctx.fill();
      ctx.fillStyle = "#263241";
      ctx.beginPath();
      ctx.arc(0, 36, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawHuman(phase, config) {
      const { stride, counter, bendA, bendB } = limbAngles(phase, config);
      drawShadow(config);

      ctx.save();
      ctx.rotate(config.lean);

      drawHumanLeg(-13, -50, stride, bendA, "#2e5e7e");
      drawHumanLeg(13, -50, counter, bendB, "#1e4059");

      ctx.fillStyle = state.personality === "confident" ? "#d94f45" : state.personality === "lazy" ? "#6a8b55" : "#2c3b57";
      roundRect(-30, -126, 60, 78, 18);
      ctx.fill();

      drawHumanArm(-32, -118, counter * config.arm, "#f2b37f", state.personality);
      drawHumanArm(32, -118, stride * config.arm, "#f2b37f", state.personality);

      ctx.fillStyle = "#f0b985";
      ctx.beginPath();
      ctx.arc(0, -158, 24, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#2b2420";
      ctx.beginPath();
      ctx.arc(-6, -169, 24, Math.PI, Math.PI * 1.93);
      ctx.lineTo(20, -154);
      ctx.quadraticCurveTo(6, -177, -18, -159);
      ctx.fill();

      ctx.strokeStyle = "#2b2420";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(-7, -156, 2, 0, Math.PI * 2);
      ctx.arc(10, -156, 2, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      if (state.personality === "lazy") {
        ctx.moveTo(-7, -145);
        ctx.quadraticCurveTo(2, -141, 11, -145);
      } else if (state.personality === "sneaky") {
        ctx.moveTo(-5, -144);
        ctx.lineTo(11, -144);
      } else {
        ctx.moveTo(-9, -145);
        ctx.quadraticCurveTo(2, -138, 13, -145);
      }
      ctx.stroke();

      ctx.restore();
    }

    function drawHumanLeg(x, y, swing, bend, color) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(swing * 0.42);
      ctx.strokeStyle = color;
      ctx.lineWidth = 14;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(0, 43);
      ctx.stroke();
      ctx.translate(0, 41);
      ctx.rotate(bend * 0.68);
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(0, 45);
      ctx.stroke();
      ctx.strokeStyle = "#1c2430";
      ctx.lineWidth = 10;
      ctx.beginPath();
      ctx.moveTo(-2, 45);
      ctx.lineTo(24, 45);
      ctx.stroke();
      ctx.restore();
    }

    function drawHumanArm(x, y, swing, color, mood) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(-swing * 0.42 + (mood === "lazy" ? 0.32 : 0));
      ctx.strokeStyle = color;
      ctx.lineWidth = 11;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(0, 40);
      ctx.stroke();
      ctx.translate(0, 38);
      ctx.rotate(mood === "sneaky" ? -0.9 : 0.36);
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(0, 33);
      ctx.stroke();
      ctx.restore();
    }

    function drawStick(phase, config) {
      const { stride, counter, bendA, bendB } = limbAngles(phase, config);
      const ink = state.personality === "sneaky" ? "#f2e7be" : "#202633";
      drawShadow(config);

      ctx.save();
      ctx.rotate(config.lean);
      ctx.strokeStyle = ink;
      ctx.lineWidth = 6;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      drawStickLeg(-8, -58, stride, bendA, ink);
      drawStickLeg(8, -58, counter, bendB, ink);

      ctx.beginPath();
      ctx.moveTo(0, -132);
      ctx.lineTo(0, -58);
      ctx.stroke();

      drawStickArm(0, -117, counter * config.arm, ink);
      drawStickArm(0, -117, stride * config.arm + Math.PI, ink);

      ctx.beginPath();
      ctx.arc(0, -160, 24, 0, Math.PI * 2);
      ctx.stroke();

      ctx.lineWidth = 2;
      ctx.beginPath();
      if (state.personality === "confident") {
        ctx.arc(0, -158, 12, 0.1, Math.PI - 0.1);
      } else if (state.personality === "lazy") {
        ctx.moveTo(-9, -151);
        ctx.quadraticCurveTo(0, -147, 10, -151);
      } else {
        ctx.moveTo(-11, -151);
        ctx.lineTo(12, -154);
      }
      ctx.stroke();

      if (state.personality === "confident") {
        ctx.fillStyle = "#e26d5a";
        ctx.beginPath();
        ctx.moveTo(-23, -184);
        ctx.lineTo(0, -206);
        ctx.lineTo(24, -184);
        ctx.closePath();
        ctx.fill();
      }

      ctx.restore();
    }

    function drawStickLeg(x, y, swing, bend, ink) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(swing * 0.5);
      ctx.strokeStyle = ink;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(0, 46);
      ctx.stroke();
      ctx.translate(0, 46);
      ctx.rotate(bend * 0.78);
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(0, 48);
      ctx.lineTo(24, 48);
      ctx.stroke();
      ctx.restore();
    }

    function drawStickArm(x, y, swing, ink) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(-swing * 0.32);
      ctx.strokeStyle = ink;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(0, 44);
      ctx.stroke();
      ctx.translate(0, 44);
      ctx.rotate(state.personality === "sneaky" ? -1 : 0.52);
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(0, 36);
      ctx.stroke();
      ctx.restore();
    }

    function roundRect(x, y, width, height, radius) {
      const r = Math.min(radius, width / 2, height / 2);
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + width, y, x + width, y + height, r);
      ctx.arcTo(x + width, y + height, x, y + height, r);
      ctx.arcTo(x, y + height, x, y, r);
      ctx.arcTo(x, y, x + width, y, r);
      ctx.closePath();
    }

    function tick(now) {
      const dt = Math.min(0.033, (now - state.lastTime) / 1000 || 0);
      state.lastTime = now;

      if (state.running) {
        const config = personalityConfig[state.personality];
        state.t += dt * state.speed;
        state.x += config.speed * state.speed * dt;
        const scale = getScale();
        if (state.x > state.width + 110 * scale) {
          state.x = -120 * scale;
        }
      }

      ctx.clearRect(0, 0, state.width, state.height);
      drawBackground();
      drawWalker();
      requestAnimationFrame(tick);
    }

    document.querySelectorAll("[data-character]").forEach((button) => {
      button.addEventListener("click", () => {
        state.character = button.dataset.character;
        setPressed("[data-character]", state.character);
        updateLabels();
      });
    });

    document.querySelectorAll("[data-personality]").forEach((button) => {
      button.addEventListener("click", () => {
        state.personality = button.dataset.personality;
        setPressed("[data-personality]", state.personality);
        updateLabels();
      });
    });

    speedInput.addEventListener("input", () => {
      state.speed = Number(speedInput.value);
      updateLabels();
    });

    playPause.addEventListener("click", () => {
      state.running = !state.running;
      playIcon.className = state.running ? "icon icon-pause" : "icon icon-play";
      playPause.setAttribute("aria-label", state.running ? "Pause animation" : "Play animation");
      playPause.title = state.running ? "Pause" : "Play";
    });

    resetButton.addEventListener("click", resetWalker);

    window.addEventListener("resize", () => {
      resize();
      if (state.x > state.width) {
        resetWalker();
      }
    });

    resize();
    resetWalker();
    updateLabels();
    requestAnimationFrame(tick);
  </script>
</body>
</html>
