<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Mood Shift</title>
  <style>
    /*
      The scene is driven by CSS custom properties. Each weather state overrides
      these variables, and the shared drawing/animation rules consume them.
    */
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --sky-top: #62b7ff;
      --sky-mid: #9bdcff;
      --sky-low: #fce7a0;
      --ground: #48a96d;
      --ground-deep: #267f54;
      --hill: #68bd79;
      --hill-back: #7ec4a7;
      --sun-opacity: 1;
      --sun-x: 18%;
      --sun-y: 18%;
      --cloud-opacity: 0.26;
      --rain-opacity: 0;
      --storm-opacity: 0;
      --mist-opacity: 0;
      --rainbow-opacity: 0;
      --bird-opacity: 1;
      --vignette-alpha: 0;
      --pond-opacity: 0.48;
      --leaf-brightness: 1.05;
      --wind-speed: 7s;
      --cloud-one-duration: 10.5s;
      --cloud-two-duration: 8.75s;
      --cloud-three-duration: 12.6s;
      --scene-filter: saturate(1.05) brightness(1.02);
      --panel-bg: rgba(255, 255, 255, 0.68);
      --panel-border: rgba(255, 255, 255, 0.58);
      --text: #132238;
      --muted: #536070;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      color: var(--text);
      background: #162033;
    }

    button {
      font: inherit;
    }

    /* Main scene shell. The background gradient forms the sky and ground. */
    .app {
      position: relative;
      min-height: 100vh;
      isolation: isolate;
      background:
        linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 48%, var(--sky-low) 72%, var(--ground) 72%, var(--ground-deep) 100%);
      filter: var(--scene-filter);
      transition:
        background 900ms ease,
        filter 900ms ease;
    }

    /*
      Weather states. JavaScript only changes data-weather; all visual changes
      are handled here so the state transition stays declarative.
    */
    .app[data-weather="cloudy"] {
      --sky-top: #8fa6ba;
      --sky-mid: #c1ccd2;
      --sky-low: #d9d8cc;
      --ground: #6c9f72;
      --ground-deep: #426f58;
      --hill: #82a57c;
      --hill-back: #91aaa1;
      --sun-opacity: 0.24;
      --sun-x: 32%;
      --sun-y: 22%;
      --cloud-opacity: 0.86;
      --bird-opacity: 0.88;
      --wind-speed: 5s;
      --cloud-one-duration: 7.5s;
      --cloud-two-duration: 6.25s;
      --cloud-three-duration: 9s;
      --pond-opacity: 0.54;
      --leaf-brightness: 0.95;
      --scene-filter: saturate(0.78) brightness(0.9);
      --panel-bg: rgba(241, 245, 246, 0.7);
      --panel-border: rgba(255, 255, 255, 0.42);
      --muted: #56616a;
    }

    .app[data-weather="rain"] {
      --sky-top: #465f77;
      --sky-mid: #788997;
      --sky-low: #9ca29b;
      --ground: #4f8463;
      --ground-deep: #294f48;
      --hill: #668b70;
      --hill-back: #778a8a;
      --sun-opacity: 0.08;
      --sun-x: 42%;
      --sun-y: 20%;
      --cloud-opacity: 0.94;
      --rain-opacity: 0.72;
      --mist-opacity: 0.28;
      --bird-opacity: 0.18;
      --wind-speed: 3.8s;
      --cloud-one-duration: 5.7s;
      --cloud-two-duration: 4.75s;
      --cloud-three-duration: 6.84s;
      --pond-opacity: 0.88;
      --leaf-brightness: 0.82;
      --scene-filter: saturate(0.68) brightness(0.78);
      --panel-bg: rgba(230, 237, 241, 0.68);
      --panel-border: rgba(255, 255, 255, 0.34);
      --text: #111d2b;
      --muted: #455260;
    }

    .app[data-weather="storm"] {
      --sky-top: #111827;
      --sky-mid: #263448;
      --sky-low: #526070;
      --ground: #324f4a;
      --ground-deep: #182e32;
      --hill: #3e5d54;
      --hill-back: #4d5c67;
      --sun-opacity: 0;
      --cloud-opacity: 1;
      --rain-opacity: 0.95;
      --storm-opacity: 1;
      --mist-opacity: 0.42;
      --bird-opacity: 0;
      --vignette-alpha: 0.4;
      --wind-speed: 2.2s;
      --cloud-one-duration: 3.3s;
      --cloud-two-duration: 2.75s;
      --cloud-three-duration: 3.96s;
      --pond-opacity: 0.96;
      --leaf-brightness: 0.62;
      --scene-filter: saturate(0.8) brightness(0.58) contrast(1.08);
      --panel-bg: rgba(224, 231, 239, 0.7);
      --panel-border: rgba(255, 255, 255, 0.3);
      --text: #0c1420;
      --muted: #384759;
    }

    .app[data-weather="calm"] {
      --sky-top: #7c9fd7;
      --sky-mid: #d5c8dc;
      --sky-low: #ffd8aa;
      --ground: #5fa879;
      --ground-deep: #2f7058;
      --hill: #78b980;
      --hill-back: #95bea4;
      --sun-opacity: 0.52;
      --sun-x: 72%;
      --sun-y: 23%;
      --cloud-opacity: 0.34;
      --mist-opacity: 0.55;
      --rainbow-opacity: 0.72;
      --bird-opacity: 0.7;
      --vignette-alpha: 0;
      --wind-speed: 9s;
      --cloud-one-duration: 13.5s;
      --cloud-two-duration: 11.25s;
      --cloud-three-duration: 16.2s;
      --pond-opacity: 0.72;
      --leaf-brightness: 0.96;
      --scene-filter: saturate(0.9) brightness(0.95);
      --panel-bg: rgba(255, 250, 241, 0.68);
      --panel-border: rgba(255, 255, 255, 0.52);
      --muted: #5e6670;
    }

    /* Sky layer holds atmospheric elements that sit behind the land. */
    .sky {
      position: absolute;
      inset: 0 0 28vh;
      overflow: hidden;
      z-index: 1;
    }

    /* The sun position and opacity are controlled per weather state. */
    .sun {
      position: absolute;
      left: var(--sun-x);
      top: var(--sun-y);
      width: clamp(5rem, 12vw, 8.75rem);
      aspect-ratio: 1;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 35%, #fffdf0 0 12%, #ffe281 13% 42%, #ffb43d 68%);
      box-shadow:
        0 0 2rem rgba(255, 234, 145, 0.82),
        0 0 5.5rem rgba(255, 203, 84, 0.62);
      opacity: var(--sun-opacity);
      transform: translate(-50%, -50%);
      transition: left 900ms ease, top 900ms ease, opacity 900ms ease;
      animation: sunPulse 5s ease-in-out infinite;
    }

    .sun::before {
      content: "";
      position: absolute;
      inset: -28%;
      border-radius: inherit;
      background: repeating-conic-gradient(from 0deg, rgba(255, 224, 113, 0.28) 0 9deg, transparent 10deg 24deg);
      animation: rotateSlow 18s linear infinite;
    }

    /* Full-screen overlay layers are non-interactive and stack inside the scene. */
    .cloud-field,
    .rain,
    .mist,
    .lightning,
    .birds,
    .rainbow {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    /* Clouds are drawn with pseudo-elements so no image assets are required. */
    .cloud {
      position: absolute;
      width: var(--w);
      aspect-ratio: 3.125 / 1;
      left: var(--x);
      top: var(--y);
      opacity: var(--cloud-opacity);
      filter: drop-shadow(0 1rem 1.4rem rgba(22, 31, 45, 0.16));
      transform: translateX(-8vw);
      animation: drift var(--duration) ease-in-out infinite alternate;
      transition: opacity 900ms ease, filter 900ms ease;
    }

    .cloud::before,
    .cloud::after,
    .cloud span {
      content: "";
      position: absolute;
      display: block;
      background: rgba(255, 255, 255, 0.88);
      border-radius: 999px;
    }

    .app[data-weather="rain"] .cloud::before,
    .app[data-weather="rain"] .cloud::after,
    .app[data-weather="rain"] .cloud span,
    .app[data-weather="storm"] .cloud::before,
    .app[data-weather="storm"] .cloud::after,
    .app[data-weather="storm"] .cloud span {
      background: rgba(115, 128, 142, 0.94);
    }

    .cloud::before {
      width: 54%;
      height: 92%;
      left: 6%;
      bottom: 0;
    }

    .cloud::after {
      width: 58%;
      height: 118%;
      right: 5%;
      bottom: 0;
    }

    .cloud span {
      width: 100%;
      height: 72%;
      left: 0;
      bottom: 0;
    }

    .cloud.one {
      --w: clamp(12rem, 27vw, 24rem);
      --x: 4%;
      --y: 14%;
      --duration: var(--cloud-one-duration);
    }

    .cloud.two {
      --w: clamp(14rem, 34vw, 28rem);
      --x: 48%;
      --y: 10%;
      --duration: var(--cloud-two-duration);
    }

    .cloud.three {
      --w: clamp(9rem, 20vw, 18rem);
      --x: 72%;
      --y: 30%;
      --duration: var(--cloud-three-duration);
    }

    .rain {
      opacity: var(--rain-opacity);
      background-image:
        repeating-linear-gradient(102deg, rgba(205, 229, 247, 0.9) 0 0.12rem, transparent 0.12rem 2.1rem),
        repeating-linear-gradient(103deg, rgba(166, 205, 232, 0.72) 0 0.1rem, transparent 0.1rem 1.45rem);
      background-size: 7.5rem 9rem, 4.5rem 6rem;
      animation: rainFall 530ms linear infinite;
      transition: opacity 700ms ease;
    }

    .lightning {
      opacity: var(--storm-opacity);
      transition: opacity 500ms ease;
    }

    .lightning::before,
    .lightning::after {
      content: "";
      position: absolute;
      width: 0.45rem;
      height: 13rem;
      top: 11%;
      left: 58%;
      background: #f9fbff;
      clip-path: polygon(40% 0, 88% 0, 55% 35%, 100% 35%, 28% 100%, 48% 52%, 0 52%);
      filter: drop-shadow(0 0 1.4rem #cde9ff);
      opacity: 0;
      transform: rotate(6deg);
      animation: flash 5.8s linear infinite;
    }

    .lightning::after {
      left: 22%;
      top: 20%;
      height: 9rem;
      animation-delay: 2.65s;
      transform: rotate(-8deg) scaleX(0.8);
    }

    /* Rainbow is only visible in the calm state via --rainbow-opacity. */
    .rainbow {
      opacity: var(--rainbow-opacity);
      transition: opacity 900ms ease;
    }

    .rainbow::before {
      content: "";
      position: absolute;
      right: clamp(1rem, 6vw, 5rem);
      bottom: 5vh;
      width: clamp(14rem, 35vw, 29rem);
      aspect-ratio: 2 / 1;
      border-radius: 50% 50% 0 0 / 100% 100% 0 0;
      background:
        radial-gradient(ellipse at bottom, transparent 0 50%, rgba(255, 77, 91, 0.66) 51% 55%, rgba(255, 170, 66, 0.6) 56% 60%, rgba(255, 235, 102, 0.58) 61% 65%, rgba(86, 190, 126, 0.55) 66% 70%, rgba(83, 150, 230, 0.55) 71% 75%, rgba(139, 102, 215, 0.5) 76% 80%, transparent 81%);
      transform: translateY(12%);
      filter: blur(0.2px);
    }

    .birds {
      opacity: var(--bird-opacity);
      transition: opacity 600ms ease;
    }

    .bird {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: 2.6rem;
      height: 1.2rem;
      animation: fly var(--duration) ease-in-out infinite;
    }

    /* Each bird uses two short bars as wings; flap rotates those bars. */
    .bird::before,
    .bird::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 55%;
      height: 0.2rem;
      background: rgba(27, 47, 75, 0.64);
      border-radius: 999px;
      transform-origin: right center;
      animation: flap 1.35s ease-in-out infinite;
    }

    .bird::after {
      right: 0;
      transform-origin: left center;
      animation-delay: -0.12s;
    }

    .bird.one {
      --x: 22%;
      --y: 31%;
      --duration: 11s;
    }

    .bird.two {
      --x: 30%;
      --y: 25%;
      --duration: 12.5s;
      transform: scale(0.72);
    }

    /* Land layer sits over the sky and contains all foreground scenery. */
    .land {
      position: absolute;
      inset: auto 0 0;
      height: 34vh;
      z-index: 2;
      overflow: hidden;
    }

    /* Hills use rounded half-ellipses, which keeps the markup lightweight. */
    .hill {
      position: absolute;
      bottom: 16%;
      width: 58vw;
      min-width: 28rem;
      aspect-ratio: 2.5 / 1;
      border-radius: 50% 50% 0 0 / 100% 100% 0 0;
      background: var(--hill);
      transition: background 900ms ease;
    }

    .hill.back {
      left: -8%;
      bottom: 23%;
      background: var(--hill-back);
      opacity: 0.72;
    }

    .hill.front {
      right: -10%;
    }

    .pond {
      position: absolute;
      left: 50%;
      bottom: 5%;
      width: clamp(13rem, 34vw, 28rem);
      height: clamp(3.2rem, 7vw, 5rem);
      border-radius: 50%;
      background:
        radial-gradient(ellipse at 50% 30%, rgba(255, 255, 255, 0.48), transparent 32%),
        linear-gradient(90deg, rgba(93, 163, 190, 0.62), rgba(91, 126, 156, 0.88), rgba(129, 183, 195, 0.62));
      transform: translateX(-50%) scaleX(1);
      opacity: var(--pond-opacity);
      transition: opacity 900ms ease;
      animation: water 4.8s ease-in-out infinite;
    }

    /* Tree wind speed follows the active weather state through --wind-speed. */
    .trees {
      position: absolute;
      inset: 0;
    }

    .tree {
      position: absolute;
      bottom: 15%;
      left: var(--x);
      width: clamp(3.3rem, 7vw, 6rem);
      height: clamp(7rem, 16vw, 13rem);
      transform-origin: 50% 100%;
      animation: sway var(--wind-speed) ease-in-out infinite;
    }

    .tree::before {
      content: "";
      position: absolute;
      left: 46%;
      bottom: 0;
      width: 12%;
      height: 44%;
      border-radius: 999px 999px 0 0;
      background: #6c4428;
    }

    .tree::after {
      content: "";
      position: absolute;
      inset: 0 2% 30%;
      border-radius: 48% 52% 46% 54%;
      background:
        radial-gradient(circle at 30% 36%, rgba(131, 199, 108, 0.95) 0 26%, transparent 27%),
        radial-gradient(circle at 66% 40%, rgba(68, 146, 87, 0.96) 0 30%, transparent 31%),
        radial-gradient(circle at 47% 12%, rgba(94, 175, 95, 0.95) 0 35%, transparent 36%),
        radial-gradient(circle at 50% 54%, rgba(45, 126, 73, 0.96) 0 42%, transparent 43%);
      filter: brightness(var(--leaf-brightness));
      transition: filter 900ms ease;
    }

    .tree.left {
      --x: clamp(1rem, 8vw, 7rem);
      animation-delay: -1.2s;
    }

    .tree.right {
      --x: calc(100% - clamp(6rem, 12vw, 13rem));
      transform: scale(0.86);
      animation-delay: -2.4s;
    }

    /* Mist and vignette are global mood overlays controlled by weather variables. */
    .mist {
      z-index: 3;
      opacity: var(--mist-opacity);
      background:
        linear-gradient(180deg, transparent 0 52%, rgba(255, 255, 255, 0.25) 67%, transparent 84%),
        repeating-linear-gradient(0deg, transparent 0 3rem, rgba(255, 255, 255, 0.18) 3.1rem 3.8rem, transparent 3.9rem 7rem);
      filter: blur(0.6rem);
      animation: mistMove 9s ease-in-out infinite alternate;
      transition: opacity 900ms ease;
    }

    .vignette {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 30%, transparent 0 42%, rgba(4, 7, 14, var(--vignette-alpha)) 100%),
        linear-gradient(180deg, transparent 0 70%, rgba(0, 0, 0, 0.14) 100%);
      transition: background 900ms ease;
    }

    /* Floating control panel. It remains separate from the decorative scene. */
    .controls {
      position: fixed;
      left: 50%;
      bottom: clamp(1rem, 4vw, 2.5rem);
      z-index: 10;
      display: grid;
      grid-template-columns: auto auto;
      align-items: center;
      gap: 0.85rem 1rem;
      min-width: min(29rem, calc(100vw - 2rem));
      padding: 0.9rem;
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      background: var(--panel-bg);
      box-shadow: 0 1.5rem 4rem rgba(18, 28, 44, 0.2);
      backdrop-filter: blur(18px);
      transform: translateX(-50%);
      transition: background 900ms ease, border-color 900ms ease;
    }

    .weather-copy {
      min-width: 0;
    }

    .weather-name {
      margin: 0;
      font-size: clamp(1.1rem, 3.5vw, 1.4rem);
      line-height: 1.1;
      font-weight: 750;
      letter-spacing: 0;
    }

    .weather-line {
      margin: 0.2rem 0 0;
      max-width: 17rem;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.35;
      letter-spacing: 0;
      transition: color 900ms ease;
    }

    .shift-button {
      justify-self: end;
      min-width: 8.3rem;
      height: 3.05rem;
      border: 0;
      border-radius: 8px;
      color: #fff;
      background: #162238;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.12), 0 0.8rem 1.8rem rgba(20, 30, 48, 0.24);
      cursor: pointer;
      font-weight: 720;
      letter-spacing: 0;
      transition: transform 160ms ease, background 250ms ease, box-shadow 250ms ease;
    }

    .shift-button:hover {
      background: #243653;
      transform: translateY(-1px);
    }

    .shift-button:active {
      transform: translateY(1px);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1), 0 0.45rem 1rem rgba(20, 30, 48, 0.2);
    }

    .shift-button:focus-visible {
      outline: 3px solid rgba(255, 255, 255, 0.9);
      outline-offset: 3px;
    }

    .steps {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0.45rem;
      height: 0.4rem;
    }

    .step {
      border-radius: 999px;
      background: rgba(27, 40, 60, 0.18);
      overflow: hidden;
    }

    .step::before {
      content: "";
      display: block;
      width: 0;
      height: 100%;
      border-radius: inherit;
      background: #162238;
      transition: width 360ms ease;
    }

    .step.active::before {
      width: 100%;
    }

    /* Animation timeline definitions used by the visual layers above. */
    @keyframes sunPulse {
      0%, 100% {
        transform: translate(-50%, -50%) scale(1);
      }
      50% {
        transform: translate(-50%, -50%) scale(1.04);
      }
    }

    @keyframes rotateSlow {
      to {
        transform: rotate(1turn);
      }
    }

    @keyframes drift {
      to {
        transform: translateX(8vw) translateY(1.2vh);
      }
    }

    @keyframes rainFall {
      from {
        background-position: 0 -9rem, 0 -6rem;
      }
      to {
        background-position: -2rem 0, -1rem 0;
      }
    }

    @keyframes flash {
      0%, 75%, 78%, 81%, 100% {
        opacity: 0;
      }
      76%, 80% {
        opacity: 0.92;
      }
    }

    @keyframes fly {
      0%, 100% {
        transform: translateX(-1.2rem) translateY(0);
      }
      50% {
        transform: translateX(2rem) translateY(-0.6rem);
      }
    }

    @keyframes flap {
      0%, 100% {
        transform: rotate(22deg);
      }
      50% {
        transform: rotate(-18deg);
      }
    }

    @keyframes sway {
      0%, 100% {
        transform: rotate(-1.4deg);
      }
      50% {
        transform: rotate(2deg);
      }
    }

    @keyframes water {
      0%, 100% {
        transform: translateX(-50%) scaleX(1);
      }
      50% {
        transform: translateX(-50%) scaleX(1.06);
      }
    }

    @keyframes mistMove {
      from {
        transform: translateX(-2vw);
      }
      to {
        transform: translateX(2vw);
      }
    }

    /* Compact layout for narrow screens. */
    @media (max-width: 560px) {
      .controls {
        grid-template-columns: 1fr;
      }

      .shift-button {
        justify-self: stretch;
        width: 100%;
      }

      .weather-line {
        max-width: none;
      }

      .tree.right {
        display: none;
      }
    }

    /* Respect OS-level motion preferences while preserving the final visuals. */
    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }

      .app,
      .sun,
      .cloud,
      .rain,
      .mist,
      .rainbow,
      .controls,
      .weather-line {
        transition-duration: 0.001ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="app" data-weather="sunny" aria-live="polite">
    <!-- Decorative weather scene. aria-hidden avoids announcing visual-only layers. -->
    <section class="sky" aria-hidden="true">
      <div class="sun"></div>
      <div class="rainbow"></div>
      <div class="birds">
        <span class="bird one"></span>
        <span class="bird two"></span>
      </div>
      <div class="cloud-field">
        <div class="cloud one"><span></span></div>
        <div class="cloud two"><span></span></div>
        <div class="cloud three"><span></span></div>
      </div>
      <div class="rain"></div>
      <div class="lightning"></div>
    </section>

    <!-- Foreground landscape elements. These respond to the same weather variables. -->
    <section class="land" aria-hidden="true">
      <div class="hill back"></div>
      <div class="hill front"></div>
      <div class="pond"></div>
      <div class="trees">
        <div class="tree left"></div>
        <div class="tree right"></div>
      </div>
    </section>

    <div class="mist" aria-hidden="true"></div>
    <div class="vignette" aria-hidden="true"></div>

    <!-- User controls and status text for the current weather state. -->
    <div class="controls">
      <div class="weather-copy">
        <h1 class="weather-name" id="weatherName">Sunny</h1>
        <p class="weather-line" id="weatherLine">Warm light, open sky, and easy movement.</p>
      </div>
      <button class="shift-button" id="shiftButton" type="button">Change</button>
      <div class="steps" aria-label="Weather progress">
        <span class="step active"></span>
        <span class="step"></span>
        <span class="step"></span>
        <span class="step"></span>
        <span class="step"></span>
      </div>
    </div>
  </main>

  <script>
    /*
      Ordered weather cycle. The key must match a CSS data-weather selector;
      name and line are displayed in the control panel.
    */
    const states = [
      {
        key: "sunny",
        name: "Sunny",
        line: "Warm light, open sky, and easy movement."
      },
      {
        key: "cloudy",
        name: "Cloudy",
        line: "The color cools as clouds fill the horizon."
      },
      {
        key: "rain",
        name: "Rain",
        line: "Soft rain lowers the pace and deepens the greens."
      },
      {
        key: "storm",
        name: "Storm",
        line: "Wind, heavy rain, and flashes take over the scene."
      },
      {
        key: "calm",
        name: "Calm",
        line: "The air settles, mist lifts, and color returns gently."
      }
    ];

    /* Cache DOM nodes once; renderState updates only text, state, and progress. */
    const app = document.querySelector(".app");
    const button = document.querySelector("#shiftButton");
    const name = document.querySelector("#weatherName");
    const line = document.querySelector("#weatherLine");
    const steps = Array.from(document.querySelectorAll(".step"));
    let index = 0;

    /* Apply one weather state. CSS handles the actual animation between values. */
    function renderState(nextIndex) {
      const state = states[nextIndex];
      app.dataset.weather = state.key;
      name.textContent = state.name;
      line.textContent = state.line;
      steps.forEach((step, stepIndex) => {
        step.classList.toggle("active", stepIndex <= nextIndex);
      });
    }

    /* Advance through the weather sequence and wrap back to sunny after calm. */
    button.addEventListener("click", () => {
      index = (index + 1) % states.length;
      renderState(index);
    });
  </script>
</body>
</html>
